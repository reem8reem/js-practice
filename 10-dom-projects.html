<!DOCTYPE html>
<html>

  <head>
  <title>DOM Projects</title>

  <style>

    body{
      font-family:Arial;
    }

    .subscribe-button{
      border: none;
      background-color: black;
      color:white;
      padding-top:10px;
      padding-bottom:10px;
      padding-left: 15px;
      padding-right: 15px;
      font-weight: bold;
      border-radius: 50px;
      cursor:pointer;
      margin-bottom:30px;
    }
    .is-subscribed{
      background-color: rgb(240, 240, 240);
      color: black;
    }

    .cost-input{
      font-size:15px;
      /*
      padding-top:10px;
      padding-bottom: 10px;
      padding-left: 10px;
      padding-right: 10px;
      */
      padding :10px;
    }

    .js-calculate{
      border: none;
      background-color: green;
      color:white;
      font-size: 15px;
      padding:12px 15px;
      font-weight: medium bold;
      cursor:pointer;
      
    }


  </style>
  
  </head>
    <body>
      <p>
        Youtube Subscribe Button
      </p>
      <button onclick="
        subscribe();
        " class="js-sub subscribe-button">   Subscribe</button>

        <p>Amazon Shipping Calculator</p>
        <input placeholder="Cost of order" 
        class="js-cost-input cost-input"
          onkeydown="
          handleCostKeyDown(event);
          
        ">
        <button onclick="
          calcualteTotal();
        "class="js-calculate">Calculate</button>
        <p class="js-cost"></p>

     <script> 
      //  String(24)
      //  console.log('25'-5);
      //  console.log('25' +5 );


      // window.document
      // window.console.log('window');
      // window.alert

      function handleCostKeyDown(event){
            if (event.key==='Enter')
              calcualteTotal();
      }
      function calcualteTotal(){
        const inputElement = document.querySelector('.js-cost-input');
        let cost =Number(inputElement.value);
        

        if (cost < 40){
          cost= cost +  10;
          console.log(cost);
        }

        document.querySelector('.js-cost').innerHTML = `$${cost}`;
      }
      
      function subscribe (){
        const buttonElement = document.querySelector('.js-sub');

          if (buttonElement.innerText === 'Subscribe'){
            buttonElement.innerHTML='Subscribed';
            buttonElement.classList.add('is-subscribed');
          } else {
            buttonElement.innerHTML='Subscribe';
            buttonElement.classList.remove('is-subscribed');
          }
        }


     </script>

    </body>
</html>
