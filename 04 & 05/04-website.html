<!DOCTYPE html>
<html>

  <head>
  <title>Buttons</title>
    <style>
    .pink-button{ /*selects which element to style*/
      background-color: light pink;  /* background color of button */
      color :darkmagenta;  /* text color of button */
      border:3px dashed pink;  /* border of button */

    }

    .blue-button{ 
      background-color: light blue;  
      color :darkblue;  
      border: 5px solid teal;  

    }
    
    .orange-button{ 
      background-color: rgba(255, 94, 0, 0.719);  
      color :black;  
      border: 1px dashed black;  

    }

    .yellow-button{ 
      background-color: rgba(251, 227, 45, 0.938);  
      color :black;  
      border: 1px dashed black;  

    }
    
    </style>
  </head>

  <body>

    <button title="click me" class="pink-button" 
    onclick=" alert('Button clicked!')"> 
    hello
    <!added a tooltip and added a label to the button and click event that is done from js-->
    </button>

    <button class="orange-button">
      Halla walla 

    </button>

    <button class="yellow-button">
      Halla walla 

    </button>

    <p>
      This is a paragraph.
    </p>

    <p>
    paragraph of <button class="blue-button">hello</button>text
    </p>

    <!-- nesting ,element insde an element-->

    <script>
      //alert("hello world");
      //halla walla

      console.log(2+2);
      console.log('some'+'text');
      console.log('welcome to my website');
    </script>

  </body>

</html>
